<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LoL Esports 2026 — Season Tracker</title>
<style>
  :root{
    --bg:#070912; --bg2:#0d1120; --panel:#121829; --panel2:#0f1422;
    --line:#1f2740; --line2:#2a3556;
    --txt:#e7ecf6; --muted:#8b96b3; --muted2:#5d6788;
    --accent:#5b8cff; --gold:#f0b429; --live:#ff3b50; --green:#27d07a;
    --radius:14px; --shadow:0 10px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",Roboto,-apple-system,"Helvetica Neue",Arial,sans-serif;
    background:
      radial-gradient(1100px 600px at 80% -10%, #16203c 0%, transparent 55%),
      radial-gradient(900px 500px at -10% 0%, #1a1330 0%, transparent 50%),
      var(--bg);
    color:var(--txt); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}

  /* Header */
  header{
    position:sticky; top:0; z-index:50;
    background:linear-gradient(180deg, rgba(7,9,18,.96), rgba(7,9,18,.78));
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .head-in{max-width:1320px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;margin-right:auto}
  .logo{
    width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:21px;
    background:linear-gradient(135deg,#2a3a6b,#5b8cff33);border:1px solid var(--line2);
    box-shadow:inset 0 0 18px rgba(91,140,255,.25);
  }
  .brand h1{font-size:16.5px;margin:0;letter-spacing:.3px}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:1px;letter-spacing:.4px}
  .head-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .clock{font-variant-numeric:tabular-nums;font-size:13px;color:var(--muted)}
  .clock b{color:var(--txt)}
  .updated{font-size:12px;color:var(--muted2);display:flex;align-items:center;gap:7px}
  .dot-live{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(39,208,122,.6);animation:pulse 2s infinite}
  .btn{
    border:1px solid var(--line2);background:var(--panel);color:var(--txt);
    padding:7px 12px;border-radius:10px;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:7px;
    transition:.15s;font-family:inherit;
  }
  .btn:hover{border-color:var(--accent);background:#161d33}
  .toggle{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .switch{width:38px;height:21px;border-radius:20px;background:#222b45;border:1px solid var(--line2);position:relative;cursor:pointer;transition:.2s;flex:none}
  .switch i{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#6b7798;transition:.2s}
  .switch.on{background:linear-gradient(135deg,#2f6bff,#1f4fd6)}
  .switch.on i{left:20px;background:#fff}

  /* ---- Season roadmap ---- */
  .rmwrap{max-width:1320px;margin:0 auto;padding:0 20px}
  .rm-top{display:flex;align-items:center;gap:12px;margin:14px 2px 0;flex-wrap:wrap}
  .rm-intro{flex:1;min-width:240px;font-size:12.5px;color:var(--muted);line-height:1.6}
  .rm-intro b{color:var(--txt)}
  .livechip{
    flex:none;display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:11px;cursor:pointer;
    background:rgba(255,59,80,.10);border:1px solid rgba(255,59,80,.35);color:#ff8093;font-size:12.5px;font-weight:700;transition:.15s;
  }
  .livechip:hover{background:rgba(255,59,80,.16)}
  .livechip.off{background:var(--panel2);border-color:var(--line2);color:var(--muted)}
  .livechip.selected{box-shadow:0 0 0 2px rgba(255,59,80,.35)}
  .livechip .pip{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 1.5s infinite;flex:none}
  .rm{display:flex;margin:10px 0 4px;overflow-x:auto;padding:14px 0 6px;scrollbar-width:thin}
  .rm::-webkit-scrollbar{height:6px}
  .rm::-webkit-scrollbar-thumb{background:#222c49;border-radius:6px}
  .rm-stop{flex:1;min-width:128px;position:relative;text-align:center;cursor:pointer;padding:6px 6px 9px;border-radius:12px;transition:.15s}
  .rm-stop:hover{background:rgba(91,140,255,.06)}
  .rm-stop.active{background:linear-gradient(180deg,rgba(91,140,255,.13),rgba(91,140,255,.04));box-shadow:inset 0 0 0 1px rgba(91,140,255,.4)}
  .rm-stop::before{content:"";position:absolute;top:24px;left:-50%;width:100%;height:2px;background:var(--line2);z-index:1}
  .rm-stop:first-child::before{display:none}
  .rm-stop.reached::before{background:linear-gradient(90deg,#2c7d4f,var(--green))}
  .rm-dot{width:36px;height:36px;margin:0 auto;border-radius:50%;display:grid;place-items:center;font-size:16px;background:var(--panel);border:2px solid var(--line2);position:relative;z-index:2;transition:.15s}
  .rm-stop.done .rm-dot{border-color:#2c7d4f;background:#0d1a14}
  .rm-stop.now .rm-dot{border-color:var(--green);box-shadow:0 0 0 0 rgba(39,208,122,.5);animation:pulse 2s infinite;background:#0d1a14}
  .rm-stop.active .rm-dot{border-color:var(--accent)}
  .rm-nowtag{position:absolute;top:-9px;left:50%;transform:translateX(-50%);z-index:3;
    font-size:8.5px;font-weight:900;letter-spacing:.8px;color:#04120a;background:var(--green);
    border-radius:20px;padding:2px 8px;box-shadow:0 2px 8px rgba(39,208,122,.4)}
  .rm-name{font-size:12.5px;font-weight:700;margin-top:8px;color:var(--txt);white-space:nowrap}
  .rm-stop.future .rm-name{color:var(--muted)}
  .rm-date{font-size:10.5px;color:var(--muted2);margin-top:2px;white-space:nowrap}
  .rm-stop.now .rm-date{color:var(--green);font-weight:700}
  .rm-cnt{display:inline-block;font-size:9.5px;font-weight:700;color:var(--muted);background:#0b1020;border:1px solid var(--line2);border-radius:16px;padding:0 6px;margin-left:5px;vertical-align:1px}
  .rm-livepip{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.5s infinite;margin-left:5px;vertical-align:1px}

  .regionbar{display:flex;gap:7px;overflow-x:auto;padding:6px 0 4px;scrollbar-width:none}
  .regionbar::-webkit-scrollbar{display:none}
  .region{
    flex:none;padding:7px 13px;border-radius:9px;border:1px solid transparent;
    background:transparent;color:var(--muted);font-size:12.5px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:7px;white-space:nowrap;transition:.15s;
  }
  .region:hover{color:var(--txt)}
  .region.active{color:#fff;background:var(--panel);border-color:var(--line2)}
  .region .dotc{width:8px;height:8px;border-radius:2px}

  /* Content */
  main{max-width:1320px;margin:0 auto;padding:10px 20px 70px}
  .stagehead{display:flex;align-items:baseline;gap:12px;margin:12px 2px 4px;flex-wrap:wrap}
  .stagehead h2{font-size:20px;margin:0;letter-spacing:.3px}
  .stagehead .desc{font-size:13px;color:var(--muted)}

  .group{margin-top:22px}
  .grouphead{display:flex;align-items:center;gap:10px;margin:0 2px 12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .grouphead .gi{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:14px;background:var(--panel);border:1px solid var(--line2)}
  .grouphead h3{font-size:15px;margin:0;letter-spacing:.3px}
  .grouphead .gtag{font-size:11.5px;color:var(--muted2);margin-left:auto}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:13px}
  .card{
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:var(--radius);padding:14px;
    display:flex;flex-direction:column;gap:11px;transition:.15s;position:relative;overflow:hidden;cursor:pointer;
  }
  .card:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:var(--shadow)}
  .card.live{border-color:#7a2230;box-shadow:0 0 0 1px rgba(255,59,80,.25),0 10px 26px rgba(255,40,60,.12)}
  .card.live::before{content:"";position:absolute;inset:0;background:radial-gradient(120px 80px at 100% 0,rgba(255,59,80,.13),transparent 70%);pointer-events:none}
  .crow{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--muted)}
  .blocktag{padding:3px 9px;border-radius:7px;background:#0e1428;border:1px solid var(--line2);color:var(--muted);font-weight:600;letter-spacing:.3px}
  .bo{margin-left:auto;color:var(--muted2)}
  .badge{padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
  .badge.live{background:rgba(255,59,80,.14);color:#ff6376;border:1px solid rgba(255,59,80,.4)}
  .badge.soon{background:rgba(91,140,255,.12);color:#8fb0ff;border:1px solid rgba(91,140,255,.3)}
  .badge.done{background:#0e1626;color:var(--muted);border:1px solid var(--line2)}
  .badge .pip{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite}

  .teams{display:flex;flex-direction:column;gap:8px}
  .team{display:flex;align-items:center;gap:11px}
  .team img{width:30px;height:30px;object-fit:contain;flex:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .team .tcode{width:30px;height:30px;flex:none;display:grid;place-items:center;font-size:11px;font-weight:800;border-radius:7px;background:#10172b;border:1px solid var(--line2);color:var(--muted)}
  .team .tname{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team .score{margin-left:auto;font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--muted);min-width:18px;text-align:center}
  .team.win .tname{color:#fff}
  .team.win .score{color:var(--gold)}
  .team.lose{opacity:.62}
  .vs{height:1px;background:var(--line);margin:1px 0 1px 41px}

  .cfoot{display:flex;align-items:center;gap:9px;margin-top:1px}
  .time{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .time b{color:var(--txt);font-weight:600}
  .cfoot-r{margin-left:auto;display:flex;align-items:center;gap:10px}
  .watch{display:flex;gap:6px}
  .wbtn{padding:6px 11px;border-radius:8px;font-size:11.5px;font-weight:700;display:flex;align-items:center;gap:6px;border:1px solid var(--line2);background:#10172b;color:var(--txt);cursor:pointer;transition:.15s}
  .wbtn:hover{transform:translateY(-1px)}
  .wbtn.yt{background:rgba(255,0,51,.13);border-color:rgba(255,0,51,.45);color:#ff5c78}
  .wbtn.tw{background:rgba(145,70,255,.14);border-color:rgba(145,70,255,.45);color:#b78bff}
  .wbtn.soop{background:rgba(31,143,255,.13);border-color:rgba(31,143,255,.4);color:#74b6ff}
  .cexpand{font-size:11px;font-weight:600;color:var(--muted2);white-space:nowrap;display:flex;align-items:center;gap:3px}
  .cexpand::after{content:"›";font-size:15px;line-height:1}
  .card:hover .cexpand{color:var(--accent)}

  .empty{text-align:center;padding:70px 20px;color:var(--muted)}
  .empty .e-ico{font-size:46px;margin-bottom:14px;opacity:.6}
  .empty h3{margin:0 0 6px;color:var(--txt);font-weight:600}
  .empty p{margin:0 auto;font-size:13.5px;max-width:440px;line-height:1.6}

  .skel{height:150px;border-radius:var(--radius);background:linear-gradient(90deg,#0f1426 25%,#151d36 37%,#0f1426 63%);background-size:400% 100%;animation:shimmer 1.4s infinite;border:1px solid var(--line)}

  footer{max-width:1320px;margin:0 auto;padding:0 20px 40px;color:var(--muted2);font-size:11.5px;line-height:1.7}

  /* ---- Bracket graph view ---- */
  .viewtoggle{display:inline-flex;gap:3px;margin-left:auto;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:3px;vertical-align:middle}
  .viewtoggle button{border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .viewtoggle button.on{background:linear-gradient(135deg,#27407e,#1b2f63);color:#fff}
  .bhint{margin:12px 2px 0;padding:9px 13px;background:rgba(91,140,255,.08);border:1px solid rgba(91,140,255,.25);border-radius:9px;color:#9db4e8;font-size:12.5px}
  .bstage-title{display:flex;align-items:center;gap:9px;margin:24px 2px 2px;font-size:15px;font-weight:700;color:var(--txt)}
  .bstage-title .bi{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;background:var(--panel);border:1px solid var(--line2);font-size:12px}
  .bstage-title .bstage-sub{font-size:11.5px;font-weight:500;color:var(--muted2);margin-left:2px}
  .bracketwrap{overflow:auto;padding:14px 2px 22px}
  .bracketwrap::-webkit-scrollbar{height:9px}
  .bracketwrap::-webkit-scrollbar-thumb{background:#222c49;border-radius:9px}
  .bracket{position:relative}
  .bconn{position:absolute;left:0;top:0;pointer-events:none;overflow:visible}
  .bconn path{fill:none;stroke:var(--line2);stroke-width:2}
  .bconn path.done{stroke:#2c7d4f}
  .bconn path.pending{stroke:var(--line2);stroke-dasharray:5 5}
  .bnode{position:absolute;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:10px;overflow:hidden;box-sizing:border-box;z-index:2;cursor:pointer}
  .bnode:hover{border-color:var(--accent)}
  .bnode.live{border-color:#7a2230;box-shadow:0 0 0 1px rgba(255,59,80,.25)}
  .bnode.qualified{border-color:var(--gold);box-shadow:0 0 0 1px rgba(240,180,41,.3),0 0 22px rgba(240,180,41,.12)}
  .bn-h{display:flex;align-items:center;gap:6px;height:22px;padding:0 9px;font-size:9.5px;font-weight:700;letter-spacing:.3px;color:var(--muted2);background:#0b1020;text-transform:uppercase;white-space:nowrap;overflow:hidden}
  .bn-h .bn-live{margin-left:auto;color:#ff6376}
  .bn-h .bn-done{margin-left:auto;color:var(--green)}
  .bn-h .bn-qual{margin-left:auto;color:var(--gold);font-weight:800;letter-spacing:.2px}
  .brow{display:flex;align-items:center;gap:8px;height:28px;padding:0 9px;border-top:1px solid var(--line);box-sizing:border-box}
  .brow img{width:18px;height:18px;object-fit:contain;flex:none}
  .brow .bcode{width:18px;text-align:center;font-size:9px;font-weight:800;color:var(--muted2);flex:none}
  .brow .bnm{flex:1;min-width:0;font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brow .bseed{flex:none;font-size:9px;font-weight:800;color:#8fb0ff;background:rgba(91,140,255,.13);border:1px solid rgba(91,140,255,.34);border-radius:4px;padding:1px 5px;min-width:16px;text-align:center}
  .brow .bsc{margin-left:auto;font-size:13px;font-weight:800;color:var(--muted2);min-width:14px;text-align:center;font-variant-numeric:tabular-nums}
  .brow.win{position:relative}
  .brow.win::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green)}
  .brow.win .bnm{color:#fff}
  .brow.win .bsc{color:var(--gold)}
  .brow.lose{opacity:.5}
  .bn-t{display:flex;align-items:center;gap:5px;height:20px;padding:0 9px;border-top:1px solid var(--line);font-size:9.5px;font-weight:600;color:var(--muted2);white-space:nowrap;overflow:hidden;box-sizing:border-box}
  .bn-t.up{color:#8fb0ff}
  .bn-t.lv{color:#ff6376}
  .champ{position:absolute;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:2}
  .champ .cbox{display:flex;align-items:center;gap:10px;width:204px;box-sizing:border-box;padding:12px 14px;border-radius:10px;background:linear-gradient(135deg,rgba(240,180,41,.16),rgba(39,208,122,.12));border:1px solid var(--gold);color:#fff;font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden}
  .champ .ctrophy{font-size:38px;filter:drop-shadow(0 4px 10px rgba(240,180,41,.4))}

  /* ---- Seed destination boxes ---- */
  .seedbox{position:absolute;box-sizing:border-box;border-radius:12px;padding:11px 13px;z-index:3}
  .seedbox.locked{background:linear-gradient(135deg,rgba(240,180,41,.18),rgba(39,208,122,.10));border:1px solid var(--gold);box-shadow:0 10px 28px rgba(240,180,41,.15)}
  .seedbox.pending{background:var(--panel2);border:1px dashed var(--line2)}
  .seedbox .sb-seed{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:800;letter-spacing:.6px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
  .seedbox.pending .sb-seed{color:var(--muted)}
  .seedbox .sb-no{display:grid;place-items:center;width:18px;height:18px;border-radius:5px;background:var(--gold);color:#1a1300;font-size:11px;font-weight:900}
  .seedbox.pending .sb-no{background:var(--line2);color:var(--muted)}
  .seedbox .sb-dest{margin-left:auto;font-size:9px;font-weight:700;color:var(--muted2);letter-spacing:.3px}
  .seedbox .sb-team{display:flex;align-items:center;gap:9px}
  .seedbox .sb-team img{width:24px;height:24px;object-fit:contain;flex:none}
  .seedbox .sb-nm{font-size:15px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .seedbox .sb-check{margin-left:auto;color:var(--green);font-weight:900;font-size:15px}
  .seedbox .sb-pending{font-size:11.5px;color:var(--muted);line-height:1.5}
  .seedbox .sb-pending b{color:var(--txt)}
  .seedbox .sb-vs{color:var(--accent);font-weight:700}

  /* ---- Standings ---- */
  .standings-row{display:flex;flex-wrap:wrap;gap:18px 26px;align-items:flex-start;margin-top:8px}
  .standings-col{flex:1 1 440px;max-width:560px;min-width:0}
  .st-grouplabel{font-size:12px;font-weight:700;color:var(--muted);margin:0 2px 8px;letter-spacing:.3px}
  .standings{width:100%;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel2)}
  .strow{display:flex;align-items:center;gap:12px;padding:9px 14px;border-top:1px solid var(--line)}
  .strow:first-child{border-top:none}
  .strow.clickable{cursor:pointer;transition:background .12s}
  .strow.clickable:hover{background:rgba(91,140,255,.09)}
  .strow.out{opacity:.42}
  .strow.top{background:linear-gradient(90deg,rgba(240,180,41,.13),transparent)}
  .st-rank{width:20px;text-align:center;font-weight:800;font-size:13px;color:var(--muted2);flex:none}
  .strow.top .st-rank{color:var(--gold)}
  .st-team{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
  .st-team img{width:22px;height:22px;object-fit:contain;flex:none}
  .st-nm{font-size:13.5px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .st-rec{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--muted);flex:none}
  .st-tag{font-size:9.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--green);background:rgba(39,208,122,.12);border:1px solid rgba(39,208,122,.3);border-radius:5px;padding:2px 7px;flex:none;width:62px;text-align:center}
  .st-tag.out{color:var(--muted2);background:transparent;border-color:transparent}

  /* ---- Team results in modal ---- */
  .tr-rec{font-size:26px;font-weight:900;color:var(--gold);margin:0 0 12px;display:flex;align-items:baseline;gap:9px;font-variant-numeric:tabular-nums}
  .tr-rec span{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2)}
  .tr-list{margin-top:14px}
  .tr-bh{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);margin:13px 0 4px}
  .tr-row{display:flex;align-items:center;gap:11px;padding:6px 0;border-top:1px solid var(--line)}
  .tr-res{width:19px;height:19px;border-radius:5px;display:grid;place-items:center;font-size:10px;font-weight:900;flex:none}
  .tr-res.w{background:rgba(39,208,122,.16);color:var(--green)}
  .tr-res.l{background:rgba(255,59,80,.14);color:#ff6376}
  .tr-opp{flex:1;min-width:0;font-size:13px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tr-sc{font-size:12.5px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}

  /* ---- Stage explainer ---- */
  .stageinfo{margin:13px 2px 2px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;overflow:hidden}

async function loadAll(){
  const cfgs=REGIONS.concat(INTL);
  const results=await Promise.allSettled(
    cfgs.map(c=>fetchJSON('getSchedule?hl=en-US&leagueId='+c.id).then(d=>({c,d})))
  );
  let all=[];
  results.forEach(r=>{
    if(r.status!=='fulfilled') return;
    const {c,d}=r.value;
    const evs=(((d.data||{}).schedule||{}).events)||[];
    evs.forEach(ev=>{ if(ev.type==='match') all.push(normEvent(ev,c)); });
  });

  try{
    const live=await fetchJSON('getLive?hl=en-US');
    const levs=(((live.data||{}).schedule||{}).events)||[];
    const byId={}; all.forEach(e=>byId[e.id]=e);
    levs.forEach(le=>{
      const tgt=byId[le.id];
      if(tgt){ tgt.streams=le.streams||[]; tgt.state='inProgress'; }
      else if(le.type==='match' && REGION_BY_ID[(le.league||{}).id]){
        const e=normEvent(le, REGION_BY_ID[le.league.id]); e.streams=le.streams||[]; e.state='inProgress'; all.push(e);
      }
    });
  }catch(e){/* live optional */}

  const dedup={};
  all.forEach(e=>{
    const k=e.id||(e.leagueSlug+'|'+e.start+'|'+e.teams.map(t=>t.code).join('v'));
    if(!dedup[k]){ dedup[k]=e; }
    else {
      const a=dedup[k];
      if((e.streams&&e.streams.length)&&!(a.streams&&a.streams.length)) a.streams=e.streams;
      if(e.state==='inProgress') a.state='inProgress';
    }
  });
  all=Object.values(dedup);

  DATA.events=all;
  computeStages();
  if(!initialized){
    initialized=true;
    curStage=detectCurrentStage();
    if(curView==='bracket' && !bracketAllowed(curStage)) curView='list';
  }
  DATA.ts=Date.now();
  render(true);
  renderUpdated();
}

function computeStages(){
  const evs=DATA.events;
  const inYear=e=>yearOf(e.start)===SEASON_YEAR;

  const fsAll=evs.filter(e=>e.leagueSlug==='first_stand'&&inYear(e));
  const msiAll=evs.filter(e=>e.leagueSlug==='msi'&&inYear(e));
  const worldsAll=evs.filter(e=>e.leagueSlug==='worlds'&&inYear(e));

  const max=a=>a.length?Math.max.apply(null,a.map(e=>+new Date(e.start))):null;
  const min=a=>a.length?Math.min.apply(null,a.map(e=>+new Date(e.start))):null;

  const fsEnd  = max(fsAll);
  const msiStart=min(msiAll);
  const msiEnd = max(msiAll);

  const isRegional=e=>REGIONS.some(r=>r.slug===e.leagueSlug);
  const t=e=>+new Date(e.start);

  const rtm=evs.filter(e=>isRegional(e)&&inYear(e)
      && (fsEnd? t(e)>fsEnd : true)
      && (msiStart? t(e)<msiStart : true));
  const summer=evs.filter(e=>isRegional(e)&&inYear(e) && (msiEnd? t(e)>msiEnd : false));
  const live=evs.filter(e=>e.state==='inProgress');

  DATA.byStage={ live, fs:fsAll, rtm, msi:msiAll, summer, worlds:worldsAll };
}

function detectCurrentStage(){
  const order=ROADMAP_KEYS;
  const now=Date.now();
  for(const k of order){ if((DATA.byStage[k]||[]).some(e=>e.state==='inProgress')) return k; }
  for(const k of order){
    const evs=DATA.byStage[k]||[]; if(!evs.length) continue;
    const hasUnstarted=evs.some(e=>e.state==='unstarted');
    const startedOrDone=evs.some(e=>e.state==='completed' || +new Date(e.start)<=now);
    if(hasUnstarted && startedOrDone) return k;
  }
  let best=null,bestT=Infinity;
  for(const k of order){ (DATA.byStage[k]||[]).forEach(e=>{ if(e.state==='unstarted'){ const t=+new Date(e.start); if(t<bestT){bestT=t;best=k;} } }); }
  if(best) return best;
  for(let i=order.length-1;i>=0;i--){ if((DATA.byStage[order[i]]||[]).length) return order[i]; }
  return 'rtm';
}

function eventsFor(stageKey){
  let list=(DATA.byStage[stageKey]||[]).slice();
  const stage=STAGES.find(s=>s.key===stageKey);
  if(stage&&stage.multi&&curRegion!=='all') list=list.filter(e=>e.leagueSlug===curRegion);
  const rank=e=> e.state==='inProgress'?0 : e.state==='unstarted'?1 : 2;
  list.sort((a,b)=>{
    const ra=rank(a), rb=rank(b);
    if(ra!==rb) return ra-rb;
    const ta=+new Date(a.start), tb=+new Date(b.start);
    return ra===2 ? tb-ta : ta-tb;
  });
  return list;
}

async function currentTournamentId(lgId, opt){
  opt=opt||{};
  const ck=lgId+'|'+(opt.year||'');
  if(TOURNEY_CACHE[ck]!==undefined) return TOURNEY_CACHE[ck];
  let id=null;
  try{
    const d=await fetchJSON('getTournamentsForLeague?hl=en-US&leagueId='+lgId);
    let ts=((((d.data||{}).leagues||[])[0]||{}).tournaments)||[];
    const today=new Date().toISOString().slice(0,10);
    if(opt.year){
      ts=ts.filter(t=>String(t.startDate||'').slice(0,4)==String(opt.year))
           .sort((a,b)=>String(b.startDate).localeCompare(String(a.startDate)));
      id=ts.length?ts[0].id:null;
    }else{
      let act=ts.filter(t=>String(t.startDate||'')<=today && String(t.endDate||'')>=today)
               .sort((a,b)=>String(b.startDate).localeCompare(String(a.startDate)));
      if(!act.length) act=ts.filter(t=>String(t.startDate||'')<=today)
               .sort((a,b)=>String(b.startDate).localeCompare(String(a.startDate)));
      id=act.length?act[0].id:null;
    }
  }catch(e){}
  TOURNEY_CACHE[ck]=id; return id;
}

function buildGraph(columns){
  const nodes=[];
  columns.forEach((col,ci)=>(col.cells||[]).forEach(cell=>(cell.matches||[]).forEach(m=>{
    nodes.push({sid:m.structuralId||('n'+nodes.length), col:ci, cell:cell.name||'', state:m.state||'unstarted',
      teams:(m.teams||[]).map(bTeam), origins:(m.teams||[]).map(t=>t.origin||null)});
  })));
  const bySid={}; nodes.forEach(n=>bySid[n.sid]=n);
  const edges=[];
  nodes.forEach(n=>n.origins.forEach(o=>{ if(o&&o.type==='match'&&bySid[o.structuralId]) edges.push({from:o.structuralId,to:n.sid,slot:o.slot}); }));
  return {nodes,bySid,edges,cols:columns.length};
}
function layoutGraph(g){
  const parents={}; g.nodes.forEach(n=>parents[n.sid]=[]);
  g.edges.forEach(e=>{ if(parents[e.to]) parents[e.to].push(e.from); });
  const isFrom={}; g.edges.forEach(e=>isFrom[e.from]=true);
  const dCache={};
  function depth(sid){ if(dCache[sid]!=null) return dCache[sid];
    const ps=parents[sid]; if(!ps.length) return dCache[sid]=0;
    let m=0; ps.forEach(p=>m=Math.max(m,depth(p)+1)); return dCache[sid]=m; }
  g.nodes.forEach(n=>n.depth=depth(n.sid));
  g.cols=Math.max.apply(null,g.nodes.map(n=>n.depth))+1;
  const roots=g.nodes.filter(n=>!isFrom[n.sid]).sort((a,b)=> (b.depth-a.depth) || (g.nodes.indexOf(a)-g.nodes.indexOf(b)));
  let slot=0; const yOf={};
  function assign(sid){
    if(yOf[sid]!=null) return yOf[sid];
    const ps=parents[sid];
    if(!ps.length) return yOf[sid]=slot++;
    let s=0; ps.forEach(p=>s+=assign(p)); return yOf[sid]=s/ps.length;
  }
  roots.forEach(r=>assign(r.sid));
  g.nodes.forEach(n=>{ if(yOf[n.sid]==null) yOf[n.sid]=slot++; });
  g.nodes.forEach(n=>{ n.x=B.PAD+n.depth*B.COLW; n.y=B.PAD+yOf[n.sid]*B.SLOT; });
  const byCol={}; g.nodes.forEach(n=>(byCol[n.depth]=byCol[n.depth]||[]).push(n));
  Object.values(byCol).forEach(arr=>{ arr.sort((a,b)=>a.y-b.y);
    for(let i=1;i<arr.length;i++){ if(arr[i].y-arr[i-1].y<B.SLOT) arr[i].y=arr[i-1].y+B.SLOT; } });
  g.width=B.PAD+g.cols*B.COLW;
  g.height=B.PAD+Math.max.apply(null,g.nodes.map(n=>n.y+B.NH))+B.PAD;
  g.winnerConsumed=sid=>g.edges.some(e=>e.from===sid && e.slot===1);
  return g;
}
/* Match a bracket node to its schedule event (which carries the start time). */
function findScheduleEvent(slug, node){
  const codes=node.teams.map(t=>t.code).filter(Boolean);
  if(codes.length<2||!slug) return null;
  const key=codes.slice().sort().join('|');
  const cands=DATA.events.filter(e=>e.start
    && e.leagueSlug===slug
    && e.teams.map(t=>t.code).filter(Boolean).sort().join('|')===key);
  if(!cands.length) return null;
  // same pair can meet twice (double-elim) — prefer matching state, then matching score, then nearest in time
  let pool=cands.filter(e=>e.state===node.state);
  if(!pool.length) pool=cands;
  if(node.state==='completed'&&pool.length>1){
    const w={}; node.teams.forEach(t=>{ if(t.code&&t.wins!=null) w[t.code]=t.wins; });
    const exact=pool.filter(e=>e.teams.every(t=>w[t.code]==null||t.wins==null||w[t.code]===t.wins));
    if(exact.length) pool=exact;
  }
  const now=Date.now();
  return pool.slice().sort((a,b)=>Math.abs(+new Date(a.start)-now)-Math.abs(+new Date(b.start)-now))[0];
}

  else if(done) foot='<div class="bn-t">🏁 '+(ev?fmtTimeShort(ev.start):T().ended)+'</div>';
  else foot='<div class="bn-t up">🕑 '+(ev?fmtTimeShort(ev.start)+' · '+relTime(ev.start):T().schedTBD)+'</div>';
  return '<div class="bnode'+(live?' live':'')+(n._qual?' qualified':'')+'" style="left:'+n.x+'px;top:'+n.y+'px;width:'+B.NW+'px" onclick="openMatchModal(\'b_'+n.sid+'\')">'+head+rows+foot+'</div>';
}
function bracketSectionHTML(columns, stageName, sectionName, showChamp, seedCount){
  const g=layoutGraph(buildGraph(columns));
  if(!g.nodes.length) return '';
  const isFrom={}; g.edges.forEach(e=>isFrom[e.from]=true);
  const winners=g.nodes.filter(n=> n.state==='completed' && n.teams.some(t=>t.outcome==='win') && !g.winnerConsumed(n.sid));

  let extra=0, sideHTML='', sideEdges='';

  if(showChamp && curStage==='rtm' && seedCount>0){
    const lockedQ=winners.filter(n=>isFrom[n.sid]).sort((a,b)=>a.col-b.col);
    const finals=g.nodes.filter(n=>!isFrom[n.sid]).sort((a,b)=>a.col-b.col);
    const seedList=[];
    lockedQ.forEach(n=>{ if(seedList.length>=seedCount) return; const t=n.teams.find(x=>x.outcome==='win'); if(t) seedList.push({n,team:t,pending:false}); });
    finals.forEach(n=>{
      if(seedList.length>=seedCount) return;
      const remaining=seedCount-seedList.length;
      if(n.state==='completed'){
        const w=n.teams.find(t=>t.outcome==='win'), l=n.teams.find(t=>t.outcome==='loss');
        if(w) seedList.push({n,team:w,pending:false});
        if(remaining>=2 && l && seedList.length<seedCount){ seedList.push({n,team:l,pending:false}); n._runnerQual=true; }
      }else{
        seedList.push({n,team:null,pending:true,role:'winner'});
        if(remaining>=2 && seedList.length<seedCount){ seedList.push({n,team:null,pending:true,role:'runner'}); n._runnerQual=true; }
      }
    });
    if(seedList.length){
      extra=320;
      const bx=B.PAD+g.cols*B.COLW+48, bw=214, bh=74, rail=bx-26;
      seedList.slice(0,seedCount).forEach((o,i)=>{
        const by=B.PAD+i*(bh+30), seedNo=i+1, a=o.n;
        sideEdges+='<path class="'+(o.pending?'pending':'done')+'" d="M'+(a.x+B.NW)+','+(a.y+B.NH/2)+' H'+rail+' V'+(by+bh/2)+' H'+bx+'"/>';
        if(o.pending){
          const t0=a.teams[0]||{}, t1=a.teams[1]||{};
          const lbl=o.role==='runner'?T().secondIn:T().firstIn;
          sideHTML+='<div class="seedbox pending" style="left:'+bx+'px;top:'+by+'px;width:'+bw+'px">'
            +'<div class="sb-seed"><span class="sb-no">'+seedNo+'</span> '+T().seed+'<span class="sb-dest">'+T().toMSI+'</span></div>'
            +'<div class="sb-pending">'+lbl+' <b>'+esc(a.cell||'Final')+'</b><br><span class="sb-vs">'+esc(t0.code||t0.name||'TBD')+' vs '+esc(t1.code||t1.name||'TBD')+'</span></div></div>';
        }else{
          const t=o.team||{}, img=t.img?'<img src="'+t.img+'">':'';
          sideHTML+='<div class="seedbox locked" style="left:'+bx+'px;top:'+by+'px;width:'+bw+'px">'
            +'<div class="sb-seed"><span class="sb-no">'+seedNo+'</span> '+T().seed+'<span class="sb-dest">'+T().toMSI+'</span></div>'
            +'<div class="sb-team">'+img+'<span class="sb-nm">'+esc(t.name||t.code||'')+'</span><span class="sb-check">✓</span></div></div>';
        }
      });
      lockedQ.forEach(n=>n._qual=true);
    }
  } else if(showChamp){
    const champNode=winners.find(n=>!isFrom[n.sid]) || (winners.length?winners[winners.length-1]:null);
    const w=champNode&&champNode.teams.find(t=>t.outcome==='win');
    if(w){
      extra=250;
      const cx=B.PAD+g.cols*B.COLW, cy=champNode.y;
      const img=w.img?'<img src="'+w.img+'" style="width:30px;height:30px;object-fit:contain">':'';
      sideHTML='<div class="champ" style="left:'+cx+'px;top:'+(cy-4)+'px"><div class="cbox">'+img+'<span style="overflow:hidden;text-overflow:ellipsis">'+esc(w.name||w.code)+'</span></div><div class="ctrophy">🏆</div></div>';
      const x1=champNode.x+B.NW,y1=champNode.y+B.NH/2,x2=cx,y2=cy+B.NH/2,mx=Math.round((x1+x2)/2);
      sideEdges='<path class="done" d="M'+x1+','+y1+' H'+mx+' V'+y2+' H'+x2+'"/>';
    }
  }

  const W=g.width+extra, H=g.height;
  const paths=g.edges.map(e=>{
    const a=g.bySid[e.from], b=g.bySid[e.to];
    const x1=a.x+B.NW,y1=a.y+B.NH/2,x2=b.x,y2=b.y+B.NH/2,mx=Math.round((x1+x2)/2);
    return '<path class="'+(a.state==='completed'?'done':'')+'" d="M'+x1+','+y1+' H'+mx+' V'+y2+' H'+x2+'"/>';
  }).join('')+sideEdges;
  let title=(sectionName&&sectionName!==stageName)?(stageName+' · '+sectionName):(stageName||sectionName||'Bracket');
  if(curStage==='rtm') title='Phase 2 · '+title;
  return '<div class="bstage-title"><span class="bi">🗺️</span>'+esc(title)+'</div>'
    +'<div class="bracketwrap"><div class="bracket" style="width:'+W+'px;height:'+H+'px">'
    +'<svg class="bconn" width="'+W+'" height="'+H+'">'+paths+'</svg>'
    +g.nodes.map(n=>bNodeHTML(n,g)).join('')+sideHTML+'</div></div>';
}

// Precise per-match stakes computed from the real bracket graph.
function bracketMatchMeaning(n,g){
  const ko=LANG==='ko';
  const wc=g.edges.some(e=>e.from===n.sid&&e.slot===1);
  const lc=g.edges.some(e=>e.from===n.sid&&e.slot===2);
  const destOf=slot=>{ const e=g.edges.find(x=>x.from===n.sid&&x.slot===slot); return e?esc((g.bySid[e.to]||{}).cell||''):''; };
  const inRTM = curStage==='rtm';
  let win;
  if(!wc){
    if(inRTM && n._runnerQual) return ko
      ? '🎟️ <b>둘 다 MSI에 가요!</b> 이 경기는 시드 결정전 — 이기면 상위 시드, 져도 남은 시드로 진출해요.'
      : '🎟️ <b>Both teams reach MSI!</b> This decides seeding — the winner takes the higher seed, the loser still gets the remaining one.';
    if(inRTM) win = ko
      ? (lc ? '✅ <b>이기면 MSI 진출 확정!</b> 지역의 상위 시드를 가져가요' : '✅ <b>이기면 MSI 진출 확정!</b> 남은 마지막 시드를 가져가요')
      : (lc ? '✅ <b>Winner qualifies for MSI</b> — taking the region\'s higher seed' : '✅ <b>Winner qualifies for MSI</b> — taking the last remaining seed');
    else if(/final/i.test(n.cell)) win = ko?'🏆 <b>이기면 우승!</b>':'🏆 <b>Winner is champion!</b>';
    else win = ko?'✅ 이기면 진출 확정':'✅ Winner qualifies';
  } else {
    const d=destOf(1);
    win = ko ? ('이기면 <b>'+(d||'다음 라운드')+'</b>(으)로 진출') : ('Winner advances'+(d?(' to <b>'+d+'</b>'):''));
  }
  const d2=destOf(2);
  const lose = lc
    ? (ko ? '져도 <b>바로 탈락은 아니에요</b> — '+(d2?('<b>'+d2+'</b>(으)로 내려가'):'아래 라운드로 내려가')+' 한 번 더 기회가 있어요'
          : 'The <b>loser isn\'t out</b> — drops'+(d2?(' to <b>'+d2+'</b>'):' down')+' for a second chance')
    : (ko ? '지면 <b>탈락</b>이에요' : 'The <b>loser is eliminated</b>');
  return win+'. '+lose+'.';
}
// Fallback when no bracket data matches this match — general but never wrong.
function matchMeaning(stageKey, block){
  const ko=LANG==='ko';
  const b=(block||'').toLowerCase();
  const isFinal = b.includes('final') && !b.includes('semi') && !b.includes('quarter') && !b.includes('lower bracket') && !b.includes('upper bracket');
  const regular = /week|regular|round robin|group/.test(b);
  if(stageKey==='rtm'){
    if(regular) return ko?'정규시즌 경기 — 이 승패가 플레이오프 시드(#)를 결정해요.':'Regular-season match — results decide the playoff seeds (#).';
    return ko?'Road to MSI 플레이오프 — 이길수록 MSI에 가까워져요.':'Road to MSI playoffs — every win is a step toward MSI.';
  }
  if(stageKey==='msi'){
    if(isFinal) return ko?'🏆 <b>MSI 결승</b> — 우승팀은 MSI 챔피언 + <b>Worlds 직행</b>, 소속 지역은 Worlds 추가 시드를 받아요.':'🏆 <b>MSI Grand Final</b> — the winner is crowned champion, goes <b>straight to Worlds</b>, and earns its region an extra Worlds seed.';
    if(b.includes('play-in')||b.includes('play in')) return ko?'플레이인 — 4팀 더블 엘리미네이션에서 <b>단 1팀만</b> 본선에 합류해요.':'Play-In — a 4-team double-elim bracket where <b>only 1 team</b> reaches the Bracket Stage.';
    if(b.includes('upper')) return ko?'⬆️ 승자조 — 지면 패자조로 떨어지지만 아직 탈락은 아니에요.':'⬆️ Upper bracket — lose and you drop to the lower bracket, but you\'re still alive.';
    if(b.includes('lower')) return ko?'⬇️ 패자조 — <b>여기서 지면 MSI 탈락</b>이에요.':'⬇️ Lower bracket — <b>lose here and you\'re out of MSI</b>.';
    return ko?'MSI 토너먼트 경기예요.':'An MSI tournament match.';
  }
  if(stageKey==='fs'){
    if(isFinal) return ko?'🏆 <b>First Stand 결승</b> — 우승 지역은 MSI에서 2번 시드 플레이인 면제 보상을 받아요.':'🏆 <b>First Stand Final</b> — the winning region\'s 2nd seed gets to skip the MSI Play-In.';
    if(b.includes('semifinal')) return ko?'준결승 — 이기면 First Stand 결승이에요.':'Semifinal — the winner reaches the First Stand final.';
    if(b.includes('upper')) return ko?'승자조 — 이기면 진출, 져도 최종전 기회가 남아요.':'Upper bracket — win to advance; lose and drop to a deciding match.';
    if(b.includes('lower')) return ko?'최종전 — <b>지면 First Stand 탈락</b>이에요.':'Decider — <b>lose and you\'re out</b> of First Stand.';
    return ko?'First Stand 경기예요.':'A First Stand match.';
  }
  if(stageKey==='summer'){
    if(regular) return ko?'서머 정규시즌 — 이 순위가 플레이오프와 Worlds 진출의 바탕이 돼요.':'Summer regular season — these standings feed the playoffs and Worlds qualification.';
    if(isFinal) return ko?'🎟️ 서머 플레이오프 결승 — <b>Worlds 진출</b>이 걸린 경기예요.':'🎟️ Summer playoff final — <b>Worlds qualification</b> is on the line.';
    return ko?'서머 스플릿 경기 — Worlds로 가는 메인 루트예요.':'A Summer Split match — the main road to Worlds.';
  }
  if(stageKey==='worlds'){
    if(isFinal) return ko?'🏆 <b>Worlds 결승</b> — 우승팀이 소환사의 컵을 들어올려요.':'🏆 <b>Worlds Grand Final</b> — the winner lifts the Summoner\'s Cup.';
    if(b.includes('semifinal')) return ko?'4강 — 이기면 Worlds 결승이에요.':'Semifinal — the winner reaches the Worlds final.';
    if(b.includes('quarterfinal')) return ko?'8강 — 이기면 4강 진출이에요.':'Quarterfinal — the winner advances to the semifinals.';
    if(b.includes('swiss')) return ko?'스위스 스테이지 — <b>3승이면 8강 진출, 3패면 탈락</b>이에요.':'Swiss stage — <b>3 wins advance to knockouts, 3 losses eliminate</b>.';
    if(b.includes('play')) return ko?'플레이인 — 4팀 중 1팀만 스위스 스테이지에 합류해요.':'Play-In — only 1 of 4 teams joins the Swiss stage.';
    return ko?'Worlds 경기예요.':'A Worlds match.';
  }
  if(isFinal) return ko?'결승 — 이기면 우승이에요.':'Final — the winner takes the title.';
  return ko?'토너먼트 경기예요.':'A tournament match.';
}

/* Enrich list-view meanings with real bracket data (async, cached). */
const pairKey=(slug,codes)=>curStage+'|'+slug+'|'+codes.slice().sort().join('v');
async function enrichMeanings(){
  PAIR_MEANINGS={};
  if(!bracketAllowed(curStage)) return;
  const addPairs=(secs,slug,seedCount)=>{
    const brs=secs.filter(s=>s.type==='bracket');
    brs.forEach((s,si)=>{
      const g=layoutGraph(buildGraph(s.columns));
      // mirror the seed-box logic: mark finals whose LOSER also takes an MSI seed
      if(curStage==='rtm' && seedCount>0 && si===brs.length-1){
        const isFrom={}; g.edges.forEach(e=>isFrom[e.from]=true);
        const locked=g.nodes.filter(n=>n.state==='completed'&&n.teams.some(t=>t.outcome==='win')&&!g.winnerConsumed(n.sid)&&isFrom[n.sid]).length;
        let remaining=seedCount-locked;
        g.nodes.filter(n=>!isFrom[n.sid]).sort((a,b)=>a.col-b.col).forEach(n=>{
          if(remaining>=2){ n._runnerQual=true; remaining-=2; } else remaining-=1;
        });
      }
      g.nodes.forEach(n=>{
        const codes=n.teams.map(t=>t.code).filter(Boolean);
        if(codes.length===2) PAIR_MEANINGS[pairKey(slug,codes)]={node:n,graph:g};
      });
    });
  };
  let jobs=[];
  if(curStage==='rtm'){
    const slugs=[...new Set((DATA.byStage.rtm||[]).map(e=>e.leagueSlug))];
    jobs=slugs.map(async slug=>{
      const tid=await currentTournamentId(leagueId(slug)); if(!tid) return;
      addPairs(await getBracketSections(tid), slug, MSI_SLOTS[slug]||2);
    });
  }else{
    const slug=curStage==='fs'?'first_stand':curStage;
    jobs=[(async()=>{
      const tid=await currentTournamentId(leagueId(slug),{year:SEASON_YEAR}); if(!tid) return;
      addPairs(await getBracketSections(tid), slug);
    })()];
  }
  await Promise.allSettled(jobs);
}

    + '<div class="mm-teams">'+teams+'</div>'
    + '<div class="mm-status">'+status+(bo?' · '+bo:'')+'</div>'
    + '<div class="md-meaning">'+meaning+src+'</div>'+streams;
}
function nodeModalHTML(n,g,ev){
  const status = n.state==='inProgress' ? T().liveBadge
    : n.state==='completed' ? T().finished+(ev?' · '+fmtTime(ev.start):'')
    : ev ? '⏳ '+fmtTime(ev.start)+' · '+relTime(ev.start) : T().notPlayed;
  const teams=n.teams.length?n.teams.map(t=>modalTeamRow(t,n.state)).join(''):modalTeamRow({name:'TBD'},'unstarted');
  const meaning = g ? bracketMatchMeaning(n,g)+'<div class="md-src">'+T().bracketSrc+'</div>' : matchMeaning(curStage, n.cell);
  return '<div class="mm-title">'+esc(n.cell||'Match')+'</div>'
    + '<div class="mm-teams">'+teams+'</div>'
    + '<div class="mm-status">'+status+'</div>'
    + '<div class="md-meaning">'+meaning+'</div>';
}
function openMatchModal(key){
  const v=MODAL_MAP[key]; if(!v) return;
  document.getElementById('modalBody').innerHTML = (typeof v==='function') ? v() : v;
  document.getElementById('matchModal').classList.add('show');
}
function openGloss(key){
  const g=GLOSSARY[key]; if(!g) return;
  document.getElementById('modalBody').innerHTML =
    '<div class="mm-title">📖 '+T().gloss+'</div><div class="gl-term">'+g[LANG][0]+'</div>'
    +'<div class="md-meaning">'+g[LANG][1]+'</div>';
  document.getElementById('matchModal').classList.add('show');
}
function closeModal(){ document.getElementById('matchModal').classList.remove('show'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ---------- bracket view ---------- */
async function renderBracketView(preserve){
  const token=++renderToken;
  const stage=STAGES.find(s=>s.key===curStage);
  const main=$('#main');
  const y=preserve?window.scrollY:0;
  MODAL_MAP={};
  main.innerHTML=stageHeaderHTML(stage)+'<div class="grid" style="margin-top:16px"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>';
  renderRoadmap(); syncRegionBar();

  let tids=[], hint='', seedCount=0, regionSlug=null;
  if(curStage==='msi'){ BRACKET_SLUG='msi'; tids=[await currentTournamentId(leagueId('msi'),{year:SEASON_YEAR})]; }
  else if(curStage==='worlds'){ BRACKET_SLUG='worlds'; tids=[await currentTournamentId(leagueId('worlds'),{year:SEASON_YEAR})]; }
  else if(curStage==='fs'){ BRACKET_SLUG='first_stand'; tids=[await currentTournamentId(leagueId('first_stand'),{year:SEASON_YEAR})]; }
  else if(curStage==='rtm'){
    let slug=curRegion;
    if(slug==='all'){ slug='lck'; hint=T().allHint; }
    seedCount=MSI_SLOTS[slug]||2; regionSlug=slug; BRACKET_SLUG=slug;
    tids=[await currentTournamentId(leagueId(slug))];
  }
  tids=tids.filter(Boolean);
  if(token!==renderToken) return;

  if(!tids.length){
    const msg = curStage==='rtm' ? T().noBracketRtm : curStage==='worlds' ? T().emptyWorlds : T().noBracketGeneric;
    main.innerHTML=stageHeaderHTML(stage)+'<div class="empty"><div class="e-ico">🗺️</div><h3>'+T().noBracketYet+'</h3><p>'+msg+'</p></div>';
    renderRoadmap(); return;
  }

  let allSecs=[];
  for(const tid of tids){
    const secs=await getBracketSections(tid);
    if(token!==renderToken) return;
    allSecs=allSecs.concat(secs);
  }
  const bracketCodes=new Set();
  allSecs.forEach(s=>{ if(s.type==='bracket') s.columns.forEach(c=>(c.cells||[]).forEach(cell=>(cell.matches||[]).forEach(m=>(m.teams||[]).forEach(t=>{ if(t.code) bracketCodes.add(t.code); })))); });
  const standingsSecs=allSecs.filter(s=>s.type==='standings');
  const bracketSecs=allSecs.filter(s=>s.type==='bracket');
  let body='';
  if(standingsSecs.length){
    const stageName=standingsSecs[0].stage||T().phase1Standings;
    const fmt = standingsSecs.length>1 ? T().fmtGroups(standingsSecs.length) : T().fmtSingle;
    body+='<div class="bstage-title"><span class="bi">📊</span><span>Phase 1 · '+esc(stageName)
      +'<span class="bstage-sub"> — '+fmt+'</span></span></div>';
    body+='<div class="standings-row">'+standingsSecs.map(s=>standingsTableHTML(s,bracketCodes,regionSlug)).join('')+'</div>';
  }
  bracketSecs.forEach((s,i)=>{ body+=bracketSectionHTML(s.columns, s.stage, s.section, i===bracketSecs.length-1, seedCount); });
  let html=stageHeaderHTML(stage);
  if(hint) html+='<div class="bhint">ℹ️ '+hint+'</div>';
  html += body || emptyState(stage);
  main.innerHTML=html;
  renderRoadmap();
  if(preserve) window.scrollTo(0,y);
}

/* ---------- season roadmap ---------- */
const fmtDateShort=ts=>new Date(ts).toLocaleDateString(LANG==='ko'?'ko-KR':undefined,{month:'short',day:'numeric'});
function stageDateInfo(key){
  const evs=DATA.byStage[key]||[];
  if(!evs.length) return {status:'none'};
  const starts=evs.map(e=>+new Date(e.start));
  const min=Math.min.apply(null,starts), max=Math.max.apply(null,starts);
  const now=Date.now();
  const hasLive=evs.some(e=>e.state==='inProgress');
  const hasUnstarted=evs.some(e=>e.state==='unstarted');
  const hasDone=evs.some(e=>e.state==='completed');
  let status;
  if(hasLive || (hasUnstarted && (hasDone || min<=now))) status='ongoing';
  else if(min>now) status='upcoming';
  else status='done';
  return {min,max,status};
}
function selectStage(k){
  curStage=k;
  if(curView==='bracket' && !bracketAllowed(k)) curView='list';
  syncRegionBar(); render(); renderRoadmap();
}
function renderRoadmap(){
  $('#rmIntro').innerHTML=T().intro;
  const liveN=(DATA.byStage.live||[]).length;
  const chip=$('#liveChip');
  chip.classList.toggle('off',!liveN);
  chip.classList.toggle('selected',curStage==='live');
  $('#liveChipTxt').textContent = liveN ? T().liveNow(liveN) : T().liveNone;

  const rm=$('#roadmap'); rm.innerHTML='';
  const cur=(DATA.events&&DATA.events.length)?detectCurrentStage():null;
  ROADMAP_KEYS.forEach(k=>{
    const stage=STAGES.find(s=>s.key===k);
    const tx=stx(k);
    const di=stageDateInfo(k);
    const list=DATA.byStage[k]||[];
    const liveIn=list.filter(e=>e.state==='inProgress').length;
    const isNow = (k===cur) && di.status!=='done';
    let cls='rm-stop';
    if(di.status==='done') cls+=' done reached';
    else if(di.status==='ongoing'||isNow) cls+=' now reached';
    else cls+=' future';
    if(k===curStage) cls+=' active';
    let dateTxt;
    if(di.status==='ongoing') dateTxt='~ '+fmtDateShort(di.max);
    else if(di.status==='done') dateTxt=fmtDateShort(di.min)+'–'+fmtDateShort(di.max);
    else if(di.status==='upcoming') dateTxt=fmtDateShort(di.min)+' ~';
    else dateTxt=STATIC_DATES[k][LANG];
    const el=document.createElement('div');
    el.className=cls;
    el.innerHTML=(isNow?'<span class="rm-nowtag">NOW</span>':'')
      +'<div class="rm-dot">'+(di.status==='done'?'✓':stage.icon)+'</div>'
      +'<div class="rm-name">'+tx.name+(list.length?'<span class="rm-cnt">'+list.length+'</span>':'')+(liveIn?'<span class="rm-livepip"></span>':'')+'</div>'
      +'<div class="rm-date">'+dateTxt+'</div>';
    el.onclick=()=>selectStage(k);
    rm.appendChild(el);
  });
}

function syncRegionBar(){
  const bar=$('#regionbar');
  const stage=STAGES.find(s=>s.key===curStage);
  if(!stage||!stage.multi){ bar.style.display='none'; return; }
  bar.style.display='flex'; bar.innerHTML='';
  const present=new Set((DATA.byStage[curStage]||[]).map(e=>e.leagueSlug));
  const mk=(slug,label,color,flag)=>{
    const el=document.createElement('div');
    el.className='region'+(curRegion===slug?' active':'');
    el.innerHTML=(color?'<span class="dotc" style="background:'+color+'"></span>':'')+(flag?flag+' ':'')+label;
    el.onclick=()=>{curRegion=slug;render();syncRegionBar();};
    bar.appendChild(el);
  };
  mk('all',T().all,'','🌐');
  REGIONS.forEach(r=>{ if(present.has(r.slug)) mk(r.slug,r.label,r.color,r.flag); });
}

function relTime(iso){
  const d=+new Date(iso)-Date.now();
  const a=Math.abs(d), m=Math.round(a/60000), h=Math.round(a/3600000), days=Math.round(a/86400000);
  if(LANG==='ko'){
    const s = m<60? m+'분' : h<24? h+'시간' : days+'일';
    return d>0 ? s+' 후' : s+' 전';
  }
  const s = m<60? m+'m' : h<24? h+'h' : days+'d';
  return d>0 ? 'in '+s : s+' ago';
}
function fmtTime(iso){
  const dt=new Date(iso);
  return dt.toLocaleString(LANG==='ko'?'ko-KR':undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function streamButtons(streams){
  if(!streams||!streams.length) return '';
  const order={youtube:1,twitch:2,afreecatv:3};
  const sorted=streams.slice().sort((a,b)=>{
    const pref=LANG==='ko'?'ko':'en';
    const ae=(a.locale||'').startsWith(pref)?0:1, be=(b.locale||'').startsWith(pref)?0:1;
    if(ae!==be) return ae-be;
    return (order[a.provider]||9)-(order[b.provider]||9);
  });
  const seen={}, out=[];
  sorted.forEach(s=>{
    if(seen[s.provider]) return; seen[s.provider]=1;
    let url,cls,label;
    if(s.provider==='youtube'){url='https://www.youtube.com/watch?v='+encodeURIComponent(s.parameter);cls='yt';label='YouTube';}
    else if(s.provider==='twitch'){url='https://www.twitch.tv/'+encodeURIComponent(s.parameter);cls='tw';label='Twitch';}
    else if(s.provider==='afreecatv'){url='https://www.sooplive.co.kr/'+encodeURIComponent(s.parameter);cls='soop';label='SOOP';}
    else return;
    out.push('<a class="wbtn '+cls+'" href="'+url+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ '+label+'</a>');
  });
  return out.join('');
}

function teamRow(t, state){
  const img = t.img
    ? '<img src="'+t.img+'" alt="" onerror="this.outerHTML=\'<span class=&quot;tcode&quot;>'+esc(t.code||'?')+'</span>\'">'
    : '<span class="tcode">'+esc(t.code||'?')+'</span>';
  const showScore = (t.wins!=null) && (state==='completed'||state==='inProgress');
  const score = showScore ? '<span class="score">'+t.wins+'</span>' : '<span class="score" style="color:var(--muted2)">·</span>';
  let cls='team';
  if(state==='completed'&&t.outcome==='win') cls+=' win';
  if(state==='completed'&&t.outcome==='loss') cls+=' lose';
  return '<div class="'+cls+'">'+img+'<div class="tname">'+esc(t.name||'TBD')+'</div>'+score+'</div>';
}

function card(e){
  MODAL_MAP[e.id]=()=>cardModalHTML(e);
  const live=e.state==='inProgress';
  const done=e.state==='completed';
  let badge;
  if(live) badge='<span class="badge live"><span class="pip"></span>LIVE</span>';
  else if(done) badge='<span class="badge done">'+T().ended+'</span>';
  else badge='<span class="badge soon">'+relTime(e.start)+'</span>';

  const bo=e.bestOf?('Bo'+e.bestOf):'';
  const t0=e.teams[0]||{name:'TBD'}, t1=e.teams[1]||{name:'TBD'};
  const watch = live ? streamButtons(e.streams) : '';
  const timeHtml = live
      ? '<span class="time">🔴 <b>'+T().playingNow+'</b></span>'
      : '<span class="time">🕑 <b>'+fmtTime(e.start)+'</b></span>';

  return '<div class="card'+(live?' live':'')+'" onclick="openMatchModal(\''+e.id+'\')">'
    + '<div class="crow"><span class="blocktag" style="border-color:'+e.color+'55;color:'+e.color+'">'
        +e.flag+' '+esc(e.league)+(e.block?' · '+esc(e.block):'')+'</span><span class="bo">'+bo+'</span>'+badge+'</div>'
    + '<div class="teams">'+teamRow(t0,e.state)+'<div class="vs"></div>'+teamRow(t1,e.state)+'</div>'
    + '<div class="cfoot">'+timeHtml+'<div class="cfoot-r"><div class="watch">'+watch+'</div><span class="cexpand">'+T().details+'</span></div></div>'
    + '</div>';
}

function groupRank(evs){
  if(evs.some(e=>e.state==='inProgress')) return [0,0];
  const up=evs.filter(e=>e.state==='unstarted').map(e=>+new Date(e.start));
  if(up.length) return [1, Math.min.apply(null,up)];
  return [2, -Math.max.apply(null, evs.map(e=>+new Date(e.start)))];
}
function blockPhase(b){ return /knockout|playoff|final|gauntlet|road to msi|bracket/i.test(b||'') ? 2 : 1; }
function renderBlockSection(list){
  const groups={};
  list.forEach(e=>{ (groups[e.block||'Matches']=groups[e.block||'Matches']||[]).push(e); });
  const order=Object.keys(groups).sort((a,b)=>{ const ra=groupRank(groups[a]),rb=groupRank(groups[b]); return ra[0]-rb[0]||ra[1]-rb[1]; });
  return order.map(k=>{
    const evs=groups[k];
    const ln=evs.filter(x=>x.state==='inProgress').length;
    const tag=evs.length+' '+(evs.length>1?T().matches:T().match)+(ln?' · '+ln+' '+T().live_:'');
    return '<div class="group"><div class="grouphead"><div class="gi">📋</div><h3>'+esc(k)
      +'</h3><span class="gtag">'+tag+'</span></div><div class="grid">'+evs.map(card).join('')+'</div></div>';
  }).join('');
}

function render(preserve){
  const stage=STAGES.find(s=>s.key===curStage);
  if(curView==='bracket' && !bracketAllowed(stage.key)) curView='list';
  if(curView==='bracket' && bracketAllowed(stage.key)){ renderBracketView(preserve); return; }

  const main=$('#main');
  const y=preserve?window.scrollY:0;
  MODAL_MAP={};
  const list=eventsFor(curStage);
  let html=stageHeaderHTML(stage);

  if(!list.length){
    html += emptyState(stage);
    main.innerHTML=html; renderRoadmap(); syncRegionBar(); return;
  }

  const leagues=new Set(list.map(e=>e.leagueSlug));
  if(leagues.size>1){
    const groups={}; list.forEach(e=>{ (groups[e.leagueSlug]=groups[e.leagueSlug]||[]).push(e); });
    const order=Object.keys(groups).sort((a,b)=>{ const ra=groupRank(groups[a]),rb=groupRank(groups[b]); return ra[0]-rb[0]||ra[1]-rb[1]; });
    order.forEach(k=>{
      const evs=groups[k]; const r=REGIONS.concat(INTL).find(x=>x.slug===k)||{label:k,flag:'🌍'};
      const ln=evs.filter(x=>x.state==='inProgress').length;
      const tag=evs.length+' '+(evs.length>1?T().matches:T().match)+(ln?' · '+ln+' '+T().live_:'');
      html+='<div class="group"><div class="grouphead"><div class="gi">'+(r.flag||'🌍')+'</div><h3>'+esc(r.label)
        +'</h3><span class="gtag">'+tag+'</span></div><div class="grid">'+evs.map(card).join('')+'</div></div>';
    });
  } else if(curStage==='rtm' || curStage==='summer'){
    const p2=list.filter(e=>blockPhase(e.block)===2);
    const p1=list.filter(e=>blockPhase(e.block)===1);
    if(p2.length){
      html+='<div class="phasehead phase2"><span class="ph-n">Phase 2</span><div class="ph-t"><h3>'+T().phase2t+'</h3><span class="ph-d">'+T().phase2d(curStage)+'</span></div></div>'
        + renderBlockSection(p2);
    }
    if(p1.length){
      html+='<div class="phasehead phase1"><span class="ph-n">Phase 1</span><div class="ph-t"><h3>'+T().phase1t+'</h3><span class="ph-d">'+T().phase1d+'</span></div></div>'
        + renderBlockSection(p1);
    }
  } else {
    html+=renderBlockSection(list);
  }
  main.innerHTML=html;
  renderRoadmap(); syncRegionBar();
  if(preserve) window.scrollTo(0,y);
  enrichMeanings(); // async — sharpens the "details" modals with real bracket data
}

function emptyState(stage){
  let msg;
  if(stage.key==='live') msg=T().emptyLive;
  else if(stage.key==='worlds') msg=T().emptyWorlds;
  else if(stage.key==='summer') msg=T().emptySummer;
  else if(curRegion!=='all') msg=T().emptyRegion(curRegion.toUpperCase());
  else msg=T().emptyDefault;
  return '<div class="empty"><div class="e-ico">'+(stage.icon==='live'?'🛰️':'📭')+'</div><h3>'+T().emptyTitle+'</h3><p>'+msg+'</p></div>';
}

function renderUpdated(){
  const secs=Math.round((Date.now()-DATA.ts)/1000);
  const txt = secs<5?T().justNow: secs<60? T().secAgo(secs) : T().minAgo(Math.round(secs/60));
  const liveN=(DATA.byStage.live||[]).length;
  $('#updated').innerHTML=T().updated(txt)+(liveN?' · <b style="color:#ff6376">'+T().liveCnt(liveN)+'</b>':'');
}

/* ---------- language ---------- */
function applyLang(){
  document.documentElement.lang=LANG;
  $('#brandSub').textContent=T().sub;
  $('#autoLabel').textContent=T().auto;
  $('#langBtn').textContent=T().langBtn;
  $('#footer').textContent=T().footer;
  renderRoadmap(); syncRegionBar(); render();
}
$('#langBtn').onclick=()=>{
  LANG = LANG==='ko'?'en':'ko';
  try{ localStorage.setItem('lolTrackerLang',LANG); }catch(e){}
  applyLang();
};

/* ---------- clock + auto-refresh ---------- */
function tick(){
  const now=new Date();
  $('#clock').innerHTML='🕐 <b>'+now.toLocaleTimeString(LANG==='ko'?'ko-KR':undefined,{hour:'2-digit',minute:'2-digit',second:'2-digit'})+'</b>';
  if(DATA.ts) renderUpdated();
}
function setAuto(on){
  autoOn=on;
  $('#autoSwitch').classList.toggle('on',on);
  if(autoTimer) clearInterval(autoTimer);
  if(on) autoTimer=setInterval(loadAll, 45000);
}

$('#refreshBtn').onclick=()=>{ $('#refreshBtn').textContent='↻ …'; loadAll().finally(()=>$('#refreshBtn').textContent='↻'); };
$('#autoSwitch').onclick=()=>setAuto(!autoOn);

setInterval(tick,1000); tick();
setAuto(true);
$('#brandSub').textContent=T().sub;
$('#autoLabel').textContent=T().auto;
$('#langBtn').textContent=T().langBtn;
$('#footer').textContent=T().footer;
$('#rmIntro').innerHTML=T().intro;
$('#liveChipTxt').textContent=T().liveNone;
renderRoadmap(); syncRegionBar();
loadAll();
</script>
